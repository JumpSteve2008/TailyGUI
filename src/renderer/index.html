<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sillyTaily</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-drag" class="drag-region">
      <img id="titlebar-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230078d4'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='Arial'%3EST%3C/text%3E%3C/svg%3E" width="16" height="16">
      <span id="titlebar-label">sillyTaily</span>
      <span class="profile-tag" id="profile-tag">loading...</span>
    </div>
    <div id="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="titlebar-btn titlebar-btn-close" id="btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.2"/><line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div id="content">
    <div id="loading-screen" class="screen">
      <div class="spinner"></div>
      <p class="loading-text">Starting SillyTavern server...</p>
      <p class="loading-hint" id="loading-hint">Profile: loading...</p>
    </div>

    <div id="error-screen" class="screen" style="display:none;">
      <div class="error-icon">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="22" stroke="#d13438" stroke-width="2.5" fill="none"/>
          <line x1="24" y1="12" x2="24" y2="28" stroke="#d13438" stroke-width="3" stroke-linecap="round"/>
          <circle cx="24" cy="34" r="2" fill="#d13438"/>
        </svg>
      </div>
      <h2>Server Error</h2>
      <p class="error-message" id="error-message">The SillyTavern server could not be started.</p>
      <button class="retry-btn" id="retry-btn">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
